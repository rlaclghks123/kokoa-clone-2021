<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settings-KoKoa Clone </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="main-body">
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fas fa-wifi"></i>
        </div>

        <div class="status-bar__column">
            <span>18:43</span>
        </div>
         
        <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-quarter"></i>
        <i class="fas fa-bolt"></i>
        </div>
    </div>
   
 
    <header class="alt-header">
        <div class="alt-header__column">
            <a href="more.html">
            <i class="fas fa-chevron-left fa-2x"></i>
        </a>
        </div>
        <div class="alt-header__column">
            <h2 class="alt-header__column__title">Settings</h2>
        </div>
        <div class="alt-header__column">
            <span><i class="fas fa-search fa-lg"></i></span>
        </div>
    </header>
    
    <main class="main-screen main-screen__chat">
        <ul class="settings-list">
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <i class="fas fa-bullhorn"></i>
                    <span>Notices</span>
                </div>
                <div class="settings__setting__column"></div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <span><i class="fas fa-flask"></i></span>
                    <span>Kakao Lab</span>
                </div>
                <div class="settings__setting__column"></div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <span><i class="fas fa-info-circle"></i></span>
                    <span>Version</span>
                </div>
                <div class="settings__setting__column">
                    <span>Latest Version</span>
                </div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <i class="fas fa-lock"></i>
                    <span>Privacy</span>
                </div>
                <div class="settings__setting__column"></div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <span><i class="far fa-bell"></i></span>
                    <span>Notification</span>
                </div>
                <div class="settings__setting__column"></div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <i class="far fa-user"></i>
                    <span>User</span>
                </div>
                <div class="settings__setting__column"></div>
            </li>
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <span><i class="far fa-comment"></i></span>
                    <span>Chats</span>
                    <div class="settings__notification">N</div>
               
                </div>
                <div class="settings__setting__column"></div>
            </li>
            
            <li class="settings__setting">
                <div class="settings__setting__column">
                    <span><i class="fas fa-palette"></i></span>
                    <span>Themes</span>
                     </div>
                <div class="settings__setting__column">
                    <span>Default theme</span>
                </div>
            </li>
        </ul>
        
    </main>
    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn"><a class="nav__a" href="friends.html"><i class="far fa-user fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="chat.html"><span class="nav-commit__notification badge">1</span><i class="fas fa-comment fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="more.html"><span class="nav-ellipsis__notification"></span><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>
    </nav>
    <div class="no-mobile">
        <span>this screen is too big</span>
    </div>
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>friends-KoKoa Clone </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="main-body">
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fas fa-wifi"></i>
        </div>

        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        
         
        <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-quarter"></i>
        <i class="fas fa-bolt"></i>
        </div>
    </div>
   
    <header class="screen-header">
        <h1 class="screen-header__title">Friends</h1>
        <div class="screen-header__icons">
        <span ><i class="fas fa-search fa-lg"></i></span>
        <span ><i class="fas fa-music fa-lg"></i></span>
        <span ><i class="fas fa-cog fa-lg"></i></span>
        </div>
    </header>
    <a id="friends-display-link">
        <i class="fas fa-info-circle"></i>
        Friends' Names Display
        <i class="fas fa-chevron-right fa-xs"></i>
    </a>
    <main class="main-screen">
    <div class="user-component">
        <div class="user-component__column">
            <img class="user-component__avatar user-component__avatar-xl " src="img/mypet1.jpeg">
            <div class="user-component__text">
                <h4 class="user-component__title">Winty</h4>
                
            </div>
        </div>
        <div class="user-component__column"></div>
        <div></div>
    </div>
    <div></div>
    <div class="friends-screen__channel">
        <div class="friends-screen__channel__header">
            <span>Channel</span>
            <i class="fas fa-chevron-up fa-xs"></i>
        </div>

        <div class="user-component">
            <div class="user-component__column">
                <img class="user-component__avatar user-component__avatar-sm" src="img/kakao-channel.jpg">
                <div class="user-component__text">
                    <h4 class="user-component__title user-component__title--not-bold">Channel</h4>
                </div>
            </div>
            <div class="user-component__column">
            <div>
                <span>2</span>
                <i class="fas fa-chevron-right fa-xs"></i>
            </div>
        </div>
        </div>
    </div>
</main>
    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn"><a class="nav__a" href="friends.html"><i class="fas fa-user-alt fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="chat.html"><span class="nav-commit__notification badge">1</span><i class="far fa-comment fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="more.html"><span class="nav-ellipsis__notification"></span><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>
    </nav>
    <div class="splash-screen">
        <i class="fas fa-comment"></i>
    </div>
    <div class="no-mobile">
        <span>this screen is too big</span>
    </div>
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>

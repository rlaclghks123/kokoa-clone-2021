<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find-KoKoa Clone </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fas fa-wifi"></i>
        </div>

        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        
         
        <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-quarter"></i>
        <i class="fas fa-bolt"></i>
        </div>
    </div>
   
    <header class="screen-header">
        <h1 class="screen-header__title">Find</h1>
        <div class="screen-header__icons">
        <span><i class="fas fa-search fa-lg"></i></span>
        <span><i class="fas fa-cog fa-lg"></i></span>
        <span class="Find-cog-notification"></span>
        </div>
    </header>
   
    
    <main class="main-screen">
    <div class="icon-row">
        <div class="icon-row__icon"><i class="fas fa-qrcode"></i><span>QR Code</span></div>
        <div class="icon-row__icon"><i class="far fa-address-book"></i><span>Add by Comtacts</span></div>
        <div class="icon-row__icon"><i class="fas fa-fingerprint"></i><span>Add by ID</span></div>
        <div class="icon-row__icon"><i class="far fa-envelope"></i><span>Invite</span></div>
    </div>

        <div class="recommended-friends">
            <h6 class="recommended-friends__title">Recommended Friends</h6>
            <div>You have no recommended friends</div>
        </div>

    <div class="open-chat">
        <div class="open-chat__header">
            <h4>Open Chat</h4>
            <span>
            <h6>Go to Openchat Home</h6>
            <i class="fas fa-chevron-right fa-xs"></i>
        </span>
        </div>
       
        <div class="open-post">
            <div class="open-post__column">
                <h4>#LJA</h4>
                <h6>#이지안#울산애기#이쁜보조개</h6>
                <div class="open-post__members">
                    <img src="img/jian.jpg">
                    <span class="open-post__members__counter">28 members</span>
                    <div class="divider"></div>
                    <span class="open-post__members__active">Active</span>
                 </div>
            </div>

            <div class="open-post__column">
                 <img src="img/jian.jpg">
                 <div class="open-post__counter">
                    <i class="fas fa-heart fa-sm"></i>
                     <span>326</span>
                 </div>
            </div>
        </div>
        <div class="open-post">
            <div class="open-post__column">
                <h4>#퐁이</h4>
                <h6>#포메라니언#귀여워#꿈나라</h6>
                <div class="open-post__members">
                    <img src="img/pong.jpg">
                    <span class="open-post__members__counter">802 members</span>
                    <div class="divider"></div>
                    <span class="open-post__members__active">Active</span>
                 </div>
            </div>

            <div class="open-post__column">
                 <img src="img/pong.jpg">
                 <div class="open-post__counter">
                    <i class="fas fa-heart fa-sm"></i>
                     <span>282</span>
                 </div>
            </div>
        </div>
    
    </div>

    </main>
     <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn"><a class="nav__a" href="friends.html"><i class="far fa-user fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="chat.html"><span class="nav-commit__notification badge">32</span><i class="far fa-comment fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="more.html"><span class="nav-ellipsis__notification"></span><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>
    </nav>
    
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fas fa-wifi"></i>
        </div>

        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        
         
        <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-quarter"></i>
        <i class="fas fa-bolt"></i>
        </div>
    </div>
   
    <header class="screen-header">
        <h1 class="screen-header__title">More</h1>
        <div class="screen-header__icons">
        <span><i class="fas fa-search fa-lg"></i></span>
        <span><a href="settings.html"> <i class="fas fa-cog fa-lg"></i></a></span>
        <span class="Find-cog-notification"></span>

    <main class="main-screen">
        <div class="user-component">

                    <h4 class="user-component__title">겨울이</h4>
                    <div class="user-component__number">

                    <i class="fas fa-info-circle"></i>
                </div>
                </div>
            </div>
            <div class="user-component__column">
                <i class="far fa-comment-alt fa-2x"></i>
            </div>
            
        </div>
        <div>
        <div class="icon-row">
            <div class="icon-row__icon">
                <i class="far fa-calendar-check"></i><span>Calendar</span></div>
            <div class="icon-row__icon">
                <i class="fab fa-google-drive"></i>
                <div class=icon-row__notification></div>
                <span>Talk Drive</span>
            </div>
            <div class="icon-row__icon"><i class="far fa-smile-beam"></i><span>Emoticons</span></div>
            <div class="icon-row__icon"><i class="fas fa-palette"></i><span>Themes</span></div>
        </div>
        <div class="icon-row">
            <div class="icon-row__icon">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Account</span>
            </div>
            <div class="icon-row__icon">
                <i class="far fa-comments"></i>
                
                <span>Openchat</span>
            </div>
           
        </div>
        </div>
        <div class="more-suggestions">
            <div> Suggestions</div>
        </div>
        
        <div class="more-suggestions__icons">
            <div class="more-suggestions__icon">
               <img src="img/lol.jpg">

            </div>
            <div class="more-suggestions__icon">
                <img src="img/fifa.jpg">
                <span>FIFA online</span>
             </div>
             <div class="more-suggestions__icon">
                <img src="img/youtube.jpg">
                <span>YouTube</span>
             </div>
             <div class="more-suggestions__icon">
                <img src="img/insta.jpg">
                <span>Instagram</span>
             </div>
            
        </div>

            <li class="nav__btn"><a class="nav__a" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__a" href="more.html"><span class="nav-ellipsis__notification"></span><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
        </ul>

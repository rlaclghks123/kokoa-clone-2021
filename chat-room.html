<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat-room-KoKoa Clone </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="main-body__chat-room">
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fas fa-wifi"></i>
        </div>

        <div class="status-bar__column">
            <span>18:43</span>
        </div>
         
        <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-quarter"></i>
        <i class="fas fa-bolt"></i>
        </div>
    </div>
    <header class="alt-header">
        <div class="alt-header__column">
            <a href="chat.html">
                <i class="fas fa-chevron-left fa-2x"></i>
                </a>
        </div>

        <div class="alt-header__column">
            <h2 class="alt-header__column__title alt-header__column__title-sm">퐁이</h2>
        </div>
        <div class="alt-header__column">
            <span><i class="fas fa-search fa-lg"></i></span>
            <span><i class="fas fa-bars fa-lg"></i></span>
        </div>
    </header>
 
   
    
    <main class="main-screen main-chat-room">
       <div class="chat-room__time">
           Tuesday, June 30, 2020
       </div>
        <div class="message-row">
            
            <img src="img/pong.jpg">
            <div class="message-row__content">
                <span class="message-row__title">퐁이</span>
                <div class="message-row__text">
                    <span class="message-row__text-bubble">Hi!</span>
                    <span class="message-row__text-time">오후 5:27</span>
                </div>
            </div>
        </div>
        <div class="message-row message-row-own">
                
                <div class="message-row__text">
                    <span class="message-row__text-bubble">Hi nice to meet you!</span>
                    <span class="message-row__text-time">오후 5:32</span>
                </div>
            </div>
        </div>
    </main>
    <form class="reply">
        <div class="reply__column">
            <i class="far fa-plus-square fa-2x"></i>
        </div>
        <div class="reply__column">
            <input type="text" placeholder="write a message">
            <span><i class="far fa-smile"></i></span>
            <button><i class="fas fa-arrow-circle-up"></i></button>
            
        </div>
    </form>
    <div class="no-mobile">
        <span>this screen is too big</span>
    </div>
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
</body>
</html>
